<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Review History</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>Review History</h1>
    <nav>
      <a href="/index.html">New review</a>
      <a href="/history.html">History</a>
    </nav>
  </header>

  <main>
    <ul class="session-list" id="session-list"></ul>

    <section id="detail" hidden>

      <pre id="detail-mermaid"></pre>
      <h3>Requirements</h3>
      <pre id="detail-requirements"></pre>
      <h3>Critique</h3>
      <pre id="detail-critique"></pre>
    </section>
  </main>

  <script src="/history.js"></script>
</body>
</html>
